bind e setw synchronize-panes
bind H select-layout even-horizontal
bind V select-layout even-vertical
bind T select-layout tiled
bind k confirm-before -p "kill-window #W? (y/n)" kill-window
unbind C-b
set -g prefix C-a
bind-key C-a last-window
bind-key -r space next-window
set -s escape-time 0
set -g escape-time 0
set -g mouse off
set -g status off

# Screen-like copy: C-a Esc enters copy mode
bind-key -T prefix Escape copy-mode

# vi keys in copy mode
setw -g mode-keys vi

# Escape exits copy mode (like screen)
bind-key -T copy-mode-vi Escape send-keys -X cancel

# Enter behaves like screen: first press starts selection, second press copies & exits
bind -T copy-mode-vi Enter if -F "#{selection_present}" \
  "send -X copy-selection-and-cancel" \
  "send -X begin-selection"

bind-key -Tprefix Space   next-window
bind-key -Tprefix C-Space next-window

# --- BEGIN nested tmux toggle (C-q to toggle) ---
# Press C-q to "pass through" to inner tmux session.
# Outer status bar appears (dimmed) as visual cue.
# Press C-q again to regain outer tmux control.
bind -T root C-q \
  set prefix None \;\
  set key-table off \;\
  set status on \;\
  set status-style "bg=colour238,fg=colour245" \;\
  refresh-client -S

bind -T off C-q \
  set prefix C-a \;\
  set key-table root \;\
  set status off \;\
  set -u status-style \;\
  refresh-client -S

# Translate C-a to C-b in pass-through mode so muscle memory works
# on remote machines with default tmux prefix
bind -T off C-a send-keys C-b
# --- END nested tmux toggle (C-q to toggle) ---
