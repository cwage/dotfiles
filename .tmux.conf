bind e setw synchronize-panes
bind H select-layout even-horizontal
bind V select-layout even-vertical
bind T select-layout tiled
unbind C-b
set -g prefix C-a
bind-key C-a last-window
bind-key -r space next-window
set -s escape-time 0
set -g escape-time 0
set -g mouse off
set -g status off

# Screen-like copy: C-a Esc enters copy mode
bind-key -T prefix Escape copy-mode

# vi keys in copy mode
setw -g mode-keys vi

# Enter behaves like screen: first press starts selection, second press copies & exits
bind -T copy-mode-vi Enter if -F "#{selection_present}" \
  "send -X copy-selection-and-cancel" \
  "send -X begin-selection"

bind-key -Tprefix Space   next-window
bind-key -Tprefix C-Space next-window
